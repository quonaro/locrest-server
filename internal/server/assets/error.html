<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}} — Locrest</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0f1117;
  color: #e2e8f0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 1.5rem;
}
.card {
  background: #1a1d26;
  border: 1px solid #2d3142;
  border-radius: 1rem;
  max-width: 560px;
  width: 100%;
  text-align: center;
  padding: 2.5rem 2rem;
  box-shadow: 0 20px 40px rgba(0,0,0,0.35);
}
.icon {
  width: 64px;
  height: 64px;
  margin: 0 auto 1.25rem;
  background: #2d3142;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.75rem;
}
.status {
  display: inline-block;
  background: #2d3142;
  color: #94a3b8;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 0.35rem 0.75rem;
  border-radius: 9999px;
  margin-bottom: 1rem;
}
h1 {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  line-height: 1.25;
}
p {
  color: #94a3b8;
  font-size: 1rem;
  line-height: 1.5;
}
.cli {
  margin-top: 1.5rem;
  text-align: left;
  background: #0f1117;
  border: 1px solid #2d3142;
  border-radius: 0.75rem;
  padding: 1rem 1.25rem;
  overflow-x: auto;
}
.cli-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.5rem;
}
.cli pre {
  font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  font-size: 0.875rem;
  color: #a5b4fc;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-all;
}
.cli pre .comment {
  color: #64748b;
}
.footer {
  margin-top: 1.5rem;
  font-size: 0.875rem;
  color: #64748b;
}
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#128640;</div>
  <div class="status">HTTP {{.Code}}</div>
  <h1>{{.Title}}</h1>
  <p>{{.Message}}</p>

  <div class="cli">
    <div class="cli-label">Create a tunnel</div>
    <pre><span class="comment"># Replace 8080 with your local port</span>
curl -s https://{{.Domain}}/8080 | bash</pre>
  </div>

  <div class="footer">Locrest Tunnel</div>
</div>
</body>
</html>
